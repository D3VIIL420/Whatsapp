<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>WhatsApp Backup Loader - Premium Cosmic Glass</title>
  <!-- Bootstrap & FontAwesome -->
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/sweetalert/1.1.3/sweetalert.css"/>
  
  <style>
    /* Exact Image Mirror: Deep Cosmic Black with Cyan & Purple Nebula Glows */
    body {
      background-color: #030512;
      background-image: 
        radial-gradient(at 80% 20%, rgba(6, 182, 212, 0.18) 0px, transparent 45%), /* Cyan Nebula */
        radial-gradient(at 20% 40%, rgba(147, 51, 234, 0.15) 0px, transparent 40%), /* Purple Nebula */
        radial-gradient(at 50% 80%, rgba(8, 145, 178, 0.12) 0px, transparent 50%),
        url('https://www.transparenttextures.com/patterns/stardust.png'); /* Subtle Stars Layer */
      background-attachment: fixed;
      color: #f1f5f9;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      overflow-x: hidden;
    }

    /* Top Horizontal Glass Bar */
    header {
      background: rgba(10, 20, 38, 0.5);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      padding: 18px 0;
      text-align: center;
      border-bottom: 1.5px solid rgba(6, 182, 212, 0.3);
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.7), inset 0 1px 2px rgba(255,255,255,0.05);
      width: 100%;
    }

    header h2 {
      font-weight: 600;
      font-size: 24px;
      letter-spacing: 2px;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #ffffff;
      text-shadow: 0 0 12px rgba(6, 182, 212, 0.6);
    }

    header h2 i {
      color: #22c55e;
      margin-right: 12px;
      font-size: 28px;
    }

    /* Main Container (Outer Transparent Frame) */
    .main-container {
      background: rgba(255, 255, 255, 0.02);
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 24px;
      padding: 35px;
      max-width: 850px;
      width: 92%;
      margin: 40px auto;
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.8);
    }

    /* Inner Glass Cards */
    .glass-card {
      background: rgba(15, 23, 42, 0.35);
      border: 1px solid rgba(255, 255, 255, 0.07);
      border-radius: 16px;
      padding: 30px;
      margin-bottom: 25px;
      box-shadow: inset 0 1px 1px rgba(255,255,255,0.05);
    }

    .card-title-custom {
      text-align: center;
      font-size: 24px;
      font-weight: 500;
      color: #ffffff;
      letter-spacing: 0.5px;
    }

    .card-subtitle-custom {
      text-align: center;
      font-size: 14px;
      color: #94a3b8;
      margin-bottom: 30px;
    }

    /* Input Labels & Fields */
    label {
      font-size: 13px;
      color: #94a3b8;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .form-control, .form-control-file {
      background: rgba(6, 9, 22, 0.7) !important;
      border: 1px solid rgba(255, 255, 255, 0.12) !important;
      border-radius: 8px;
      color: #ffffff !important;
      padding: 12px;
      height: 46px;
      margin-bottom: 22px;
      transition: all 0.3s ease;
    }

    .form-control:focus {
      border-color: #06b6d4 !important;
      box-shadow: 0 0 15px rgba(6, 182, 212, 0.35) !important;
    }

    .form-control::placeholder {
      color: #475569;
    }

    select.form-control option {
      background: #090d16;
      color: #ffffff;
    }

    /* Button Container & Neon Glow Styling */
    .btn-container {
      display: flex;
      gap: 25px;
      justify-content: center;
      margin-top: 15px;
    }

    /* Exact Neon Blue Button */
    .btn-neon-blue {
      background: rgba(2, 132, 199, 0.15);
      border: 1.5px solid #0284c7;
      color: #ffffff;
      border-radius: 8px;
      padding: 10px 35px;
      font-weight: 500;
      font-size: 15px;
      flex: 1;
      max-width: 180px;
      transition: all 0.3s ease;
      box-shadow: 0 0 15px rgba(2, 132, 199, 0.3);
    }

    .btn-neon-blue:hover {
      background: #0284c7;
      box-shadow: 0 0 25px rgba(2, 132, 199, 0.7);
      transform: translateY(-1px);
    }

    /* Exact Neon Green Button */
    .btn-neon-green {
      background: rgba(13, 148, 136, 0.15);
      border: 1.5px solid #0d9488;
      color: #ffffff;
      border-radius: 8px;
      padding: 10px 35px;
      font-weight: 500;
      font-size: 15px;
      flex: 1;
      max-width: 180px;
      transition: all 0.3s ease;
      box-shadow: 0 0 15px rgba(13, 148, 136, 0.3);
    }

    .btn-neon-green:hover {
      background: #0d9488;
      box-shadow: 0 0 25px rgba(13, 148, 136, 0.7);
      transform: translateY(-1px);
    }

    #sessionDisplay {
      margin-top: 20px;
      text-align: center;
      color: #22c55e;
      font-size: 14px;
    }

    /* Bottom Horizontal Glass Bar */
    footer {
      background: rgba(10, 20, 38, 0.5);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      padding: 18px 0;
      text-align: center;
      border-top: 1.5px solid rgba(6, 182, 212, 0.3);
      box-shadow: 0 -4px 30px rgba(0, 0, 0, 0.7);
      width: 100%;
      font-size: 14px;
      color: #64748b;
    }

    footer p {
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }

    .social-icons a {
      color: #94a3b8;
      font-size: 18px;
      margin: 0 4px;
      transition: all 0.3s ease;
    }

    .social-icons a:hover {
      color: #06b6d4;
      transform: scale(1.2);
    }
  </style>
</head>
<body>

  <!-- Top Fixed Width Glass Header -->
  <header>
    <h2><i class="fab fa-whatsapp"></i> WHATSAPP BACKUP LOADER</h2>
  </header>

  <!-- Centered Glass Box Module -->
  <div class="main-container">

    <!-- 1. START AUTOMATION LOOP PANEL -->
    <div class="glass-card">
      <div class="card-title-custom">Start Session Form</div>
      <div class="card-subtitle-custom">creds.json | message.txt</div>

      <form id="sessionForm">
        <div class="row">
          <div class="col-md-6">
            <label>Sender Name</label>
            <input type="text" class="form-control" name="name" placeholder="Sender Name" required>
          </div>
          <div class="col-md-6">
            <label>Select Target Type</label>
            <select class="form-control" name="type" required>
              <option value="single">Contact</option>
              <option value="gc">Group</option>
            </select>
          </div>
        </div>

        <div class="row">
          <div class="col-md-6">
            <label>Target Number or Group ID</label>
            <input type="text" class="form-control" name="targetID" placeholder="Target Number" required>
          </div>
          <div class="col-md-6">
            <label>Delay Configuration (Seconds)</label>
            <input type="number" class="form-control" name="delayTime" placeholder="Delay ID" required>
          </div>
        </div>

        <div class="row">
          <div class="col-md-6">
            <label>Upload Configuration (JSON)</label>
            <input type="file" class="form-control-file" name="creds" accept=".json" required>
          </div>
          <div class="col-md-6">
            <label>Upload Message File (TXT)</label>
            <input type="file" class="form-control-file" name="messageFile" accept=".txt" required>
          </div>
        </div>

        <!-- Horizontal Action Buttons Alignment -->
        <div class="btn-container">
          <button type="submit" class="btn btn-neon-blue">Start Session</button>
          <button type="button" id="triggerStopView" class="btn btn-neon-green">Stop Button</button>
        </div>
        <div id="sessionDisplay"></div>
      </form>
    </div>

    <!-- 2. FORCE TERMINATION PANEL -->
    <div class="glass-card" id="stopFormWrapper">
      <div class="card-title-custom" style="font-size: 20px; color: #f87171;">Stop Session Form</div>
      <form id="stopSessionForm" class="mt-3">
        <div class="row justify-content-center">
          <div class="col-md-8">
            <input type="text" class="form-control text-center" name="sessionId" placeholder="Enter Active Session ID" required>
          </div>
        </div>
        <div class="text-center">
          <button type="submit" class="btn btn-neon-green" style="border-color: #ef4444; box-shadow: 0 0 15px rgba(239,68,68,0.25);">Terminate Link</button>
        </div>
      </form>
    </div>

  </div>

  <!-- Bottom Fixed Width Glass Footer -->
  <footer>
    <p>
      developed by 
      <span class="social-icons">
        <a href="https://facebook.com" target="_blank"><i class="fab fa-facebook"></i></a>
        <a href="https://twitter.com" target="_blank"><i class="fab fa-twitter"></i></a>
        <a href="https://instagram.com" target="_blank"><i class="fab fa-instagram"></i></a>
      </span>
    </p>
  </footer>

  <!-- JS Engine Implementations -->
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/sweetalert/1.1.3/sweetalert.min.js"></script>

  <script>
    // Submit Handler for Sending Messages
    document.getElementById('sessionForm').addEventListener('submit', async function (e) {
      e.preventDefault();
      const formData = new FormData(this);

      try {
        const res = await fetch('/send-message', { method: 'POST', body: formData });
        const result = await res.json();

        if (result.sessionId) {
          swal("✅ Started", `Session ID: ${result.sessionId}`, "success");
          document.getElementById('sessionDisplay').innerHTML = `Active ID: <code>${result.sessionId}</code>`;
        } else {
          swal("❌ Error", result.error || "Failed", "error");
        }
      } catch (err) {
        swal("❌ Error", "Server connection issue", "error");
      }
    });

    // Submit Handler for Stopping Sessions
    document.getElementById('stopSessionForm').addEventListener('submit', async function (e) {
      e.preventDefault();
      const sessionId = this.querySelector('input[name="sessionId"]').value.trim();

      try {
        const response = await fetch(`/stop-session/${sessionId}`, { method: 'POST' });
        const result = await response.text();
        swal("🛑 Stopped", result, "success");
        document.getElementById('sessionDisplay').innerHTML = '';
        this.reset();
      } catch (err) {
        swal("❌ Error", "Halt process failed", "error");
      }
    });

    // Smooth scroll down mechanism to stop card
    document.getElementById('triggerStopView').onclick = () => {
      document.getElementById('stopFormWrapper').scrollIntoView({ behavior: 'smooth' });
    };
  </script>
</body>
</html>
